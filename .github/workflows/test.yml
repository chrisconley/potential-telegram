name: Test

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'arch/**'
      - 'design/**'
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
